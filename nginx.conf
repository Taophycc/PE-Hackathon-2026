worker_processes auto;

events {
    worker_connections 2048;
}

http {
    upstream flask_app {
        server app1:8000;
        server app2:8000;
        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
