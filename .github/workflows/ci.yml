name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests & coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (including dev)
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=70 -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # This job only runs if 'test' passes — the gatekeeper pattern.
  # Any deployment step goes here. Tests failing will block this job
  # from ever starting, which is the Silver-tier requirement.
  deploy-gate:
    name: Deploy gate (blocked by tests)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Tests passed — safe to deploy
        run: echo "All tests passed. A real deploy step would go here."
